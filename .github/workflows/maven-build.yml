# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: self-hosted
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
          
      - name: Build with Maven Wrapper
        run: ./mvnw -B package

      - name: Upload
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASS }}
          NEXUS_URL: ${{ vars.NEXUS_BASE_URL }}
        run: |
          curl -sf -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file target/spring-boot-starter-parent-3.1.0.jar \
            "${NEXUS_URL}/repository/maven-releases/spring-boot-starter-parent/3.1.0/spring-boot-starter-parent-3.1.0.jar"
